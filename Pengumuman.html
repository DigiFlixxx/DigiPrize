<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiPrize - Pemilihan Pemenang</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-black: #000000;
            --cyber-green: #00ff88;
            --reel-bg: #111111;
            --gold: #ffd700;
            --bonus-pink: #ff00ff;
        }

        body, html {
            background-color: var(--bg-black); color: white;
            font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0;
            height: 100vh; width: 100vw; overflow-x: hidden;
        }

        /* --- LAYAR LOGIN --- */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-box {
            text-align: center; background: #0a0a0a; padding: 40px;
            border: 2px solid var(--cyber-green); border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }
        .login-box input {
            background: #111; border: 1px solid #333; color: white;
            padding: 12px; border-radius: 8px; width: 250px; text-align: center;
            font-size: 1.2rem; margin-bottom: 20px; outline: none;
        }

        /* --- MAIN APP --- */
        #mainApp { display: none; padding: 20px; flex-direction: column; align-items: center; }
        
        .main-title {
            font-size: 2.5rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 5px; color: white; margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .sub-title {
            font-size: 1.2rem; color: var(--cyber-green); font-weight: bold;
            letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase;
        }

        .header-box { text-align: center; margin-bottom: 20px; }
        #drawCount { color: #666; font-size: 0.9rem; letter-spacing: 2px; }
        .current-prize-text { font-size: 2.2rem; font-weight: bold; color: var(--cyber-green); text-shadow: 0 0 15px var(--cyber-green); }

        /* Slot Machine */
        .slot-machine {
            display: flex; align-items: center; gap: 15px; background: #0a0a0a;
            padding: 35px; border: 6px solid var(--cyber-green); border-radius: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); margin-bottom: 25px;
        }
        .reel {
            width: 90px; height: 130px; background: var(--reel-bg);
            border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #222;
        }
        .strip { position: absolute; width: 100%; display: flex; flex-direction: column; }
        .symbol { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: bold; color: var(--cyber-green); }
        .separator { font-size: 5rem; color: var(--cyber-green); font-weight: bold; }

        /* Buttons */
        .controls { display: flex; gap: 15px; margin-bottom: 40px; }
        .btn-main {
            background: transparent; color: var(--cyber-green); border: 2px solid var(--cyber-green);
            padding: 15px 40px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 50px; transition: 0.3s;
        }
        .btn-main:hover:not(:disabled) { background: var(--cyber-green); color: black; box-shadow: 0 0 30px var(--cyber-green); }
        .btn-bonus { border-color: var(--bonus-pink); color: var(--bonus-pink); }
        .btn-bonus:hover:not(:disabled) { background: var(--bonus-pink); color: white; box-shadow: 0 0 30px var(--bonus-pink); }

        /* --- POPUP MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #0a0a0a; border: 5px solid var(--cyber-green); border-radius: 40px;
            padding: 50px; text-align: center; max-width: 500px; width: 90%;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .img-container {
            position: relative; width: 220px; height: 220px; margin: 0 auto 20px;
            overflow: hidden; border-radius: 20px;
        }
        .modal-content img { width: 100%; height: 100%; object-fit: contain; }
        .shine {
            position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine-effect 2s infinite;
        }
        @keyframes shine-effect { 0% { left: -100%; } 100% { left: 200%; } }

        .modal-winner-num { font-size: 5rem; font-weight: 900; color: white; display: block; margin: 10px 0; }
        .btn-continue {
            margin-top: 20px; padding: 15px 40px; background: var(--cyber-green);
            color: black; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }

        .grand-prize-modal { border-color: var(--gold) !important; box-shadow: 0 0 80px rgba(255, 215, 0, 0.4); }
        .bonus-prize-modal { border-color: var(--bonus-pink) !important; box-shadow: 0 0 80px rgba(255, 0, 255, 0.4); }

        .history-container { width: 100%; max-width: 650px; background: #111; border-radius: 20px; overflow: hidden; margin-bottom: 20px;}
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table td { padding: 12px 20px; border-bottom: 1px solid #222; }

        .batch-panel {
            background: #111; padding: 10px 20px; border-radius: 10px; border: 1px solid #333;
            display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: #555;
        }
        .batch-panel input {
            background: #000; border: 1px solid #444; color: var(--cyber-green);
            width: 40px; text-align: center; border-radius: 4px; padding: 5px;
        }

        #pdf-template { padding: 50px; color: black; background: white; display: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1 style="color:white; margin:0; letter-spacing: 5px;">DIGIPRIZE</h1>
            <h2 style="color:var(--cyber-green); margin-top:0; font-size: 0.9rem; letter-spacing: 2px;">PROTECTED ACCESS</h2>
            <br>
            <input type="password" id="passInput" placeholder="Password..." onkeypress="if(event.key==='Enter') checkPass()">
            <br>
            <button class="btn-main" onclick="checkPass()" style="background:var(--cyber-green); color:black; padding: 10px 30px;">Login</button>
        </div>
    </div>

    <div id="mainApp">
        <h1 class="main-title">DIGIPRIZE</h1>
        <div class="sub-title">Pemilihan Pemenang</div>

        <div class="header-box">
            <div id="drawCount">PROGRESS UNDIAN: <span id="drawVal">1</span> / 11</div>
            <div class="current-prize-text" id="prizeLabel">HADIAH: TWS</div>
        </div>

        <div class="slot-machine">
            <div class="reel"><div id="reel1" class="strip"></div></div>
            <div class="separator">-</div>
            <div class="reel"><div id="reel2" class="strip"></div></div>
            <div class="reel"><div id="reel3" class="strip"></div></div>
            <div class="reel"><div id="reel4" class="strip"></div></div>
        </div>

        <div class="controls">
            <button id="spinBtn" class="btn-main" onclick="startDraw(false)">PUTAR MESIN</button>
            <button id="bonusBtn" class="btn-main btn-bonus" onclick="startDraw(true)">BONUS (<span id="bonusRem">10</span>)</button>
        </div>

        <div class="history-container">
            <div style="padding: 15px 20px; display: flex; justify-content: space-between; background: #1a1a1a; align-items: center;">
                <h3 style="margin:0; font-size: 0.8rem; color:var(--cyber-green); letter-spacing: 1px;">DAFTAR PEMENANG</h3>
                <button onclick="downloadPDF()" style="cursor:pointer; border:none; padding:5px 15px; border-radius:5px; font-weight: bold; font-size: 0.7rem;">SIMPAN PDF</button>
            </div>
            <table class="history-table">
                <tbody id="historyBody"></tbody>
            </table>
        </div>

        <div class="batch-panel">
            SET BATCH: <input type="text" id="batchInput" value="1" maxlength="2" onchange="updateBatch()">
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <h2 id="modalTitle" style="color:white; letter-spacing:3px; margin: 0;">SELAMAT!</h2>
            <div class="img-container">
                <img src="" id="modalImg">
                <div class="shine"></div>
            </div>
            <div id="modalPrizeName" style="font-size:1.5rem; font-weight:bold; margin-bottom: 5px;"></div>
            <span class="modal-winner-num" id="modalWinnerNum"></span>
            <button class="btn-continue" onclick="closeModal()">Lanjutkan Undian →</button>
        </div>
    </div>

    <div id="pdf-template">
        <h1 style="text-align:center;">LAPORAN PEMENANG DIGIPRIZE</h1>
        <table style="width:100%; border-collapse:collapse;" border="1"><tbody id="pdf-body"></tbody></table>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('passInput').value === "smartphone") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                init();
            } else { alert("Password Salah!"); }
        }

        // PERUBAHAN DISINI: bonusRemaining diubah dari 5 menjadi 10
        let currentDraw = 1, bonusRemaining = 10, currentBatch = "1", usedNumbers = [], winnersLog = [], isCurrentBonus = false;
        const reelElements = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3'), document.getElementById('reel4')];

        function init() {
            reelElements.forEach((reel, idx) => {
                let content = '';
                for(let i=0; i<60; i++) {
                    let num = (idx === 0) ? currentBatch : Math.floor(Math.random() * 10);
                    content += `<div class="symbol">${num}</div>`;
                }
                reel.innerHTML = content;
            });
        }

        function updateBatch() { currentBatch = document.getElementById('batchInput').value || "1"; init(); }

        function startDraw(isBonus) {
            if(!isBonus && currentDraw > 11) return;
            if(isBonus && bonusRemaining <= 0) return;

            document.getElementById('spinBtn').disabled = true;
            document.getElementById('bonusBtn').disabled = true;
            isCurrentBonus = isBonus;

            let winNum;
            do { winNum = Math.floor(Math.random() * 250) + 1; } while (usedNumbers.includes(winNum));
            usedNumbers.push(winNum);

            const winStr = winNum.toString().padStart(3, '0');
            const targets = [currentBatch, winStr[0], winStr[1], winStr[2]];
            
            let baseDur = 10;
            if (isBonus) baseDur = 13;
            if (!isBonus && currentDraw === 11) baseDur = 18;

            reelElements.forEach((reel, i) => {
                reel.insertAdjacentHTML('beforeend', `<div class="symbol" style="color:white; text-shadow: 0 0 10px var(--cyber-green)">${targets[i]}</div>`);
                const scrollY = (reel.children.length - 1) * 130;
                const individualDur = baseDur + (i * 1.2); 

                setTimeout(() => {
                    reel.style.transition = `transform ${individualDur}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    reel.style.transform = `translateY(-${scrollY}px)`;
                }, i * 100);
            });

            setTimeout(() => {
                const prize = getPrizeData(currentDraw, isBonus);
                winnersLog.push({ no: isBonus ? "BONUS" : currentDraw, kupon: `${currentBatch}-${winStr}`, prize: prize.name });
                showModal(`${currentBatch}-${winStr}`, prize);
                updateHistory();
            }, (baseDur + 5) * 1000);
        }

        function getPrizeData(drawIndex, isBonus) {
            if (isBonus) return { name: "BONUS TAMBAHAN", img: "bonus.png", theme: "bonus-prize-modal" };
            if (drawIndex === 11) return { name: "SMARTPHONE", img: "smartphone.png", theme: "grand-prize-modal" };
            return (drawIndex % 2 === 1) ? { name: "TWS", img: "tws.png", theme: "" } : { name: "SPEAKER BLUETOOTH", img: "speaker.png", theme: "" };
        }

        function showModal(kupon, prize) {
            const modal = document.getElementById('modalOverlay');
            document.getElementById('modalContent').className = "modal-content " + prize.theme;
            document.getElementById('modalImg').src = prize.img;
            document.getElementById('modalPrizeName').innerText = prize.name;
            document.getElementById('modalWinnerNum').innerText = kupon;
            document.getElementById('modalPrizeName').style.color = isCurrentBonus ? "var(--bonus-pink)" : (currentDraw === 11 ? "var(--gold)" : "var(--cyber-green)");
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            if (isCurrentBonus) { bonusRemaining--; document.getElementById('bonusRem').innerText = bonusRemaining; }
            else { currentDraw++; }
            updateUI();
            reelElements.forEach(reel => { reel.style.transition = 'none'; reel.style.transform = 'translateY(0)'; init(); });
            document.getElementById('spinBtn').disabled = (currentDraw > 11);
            document.getElementById('bonusBtn').disabled = (bonusRemaining <= 0);
        }

        function updateUI() {
            if(currentDraw <= 11) {
                const p = getPrizeData(currentDraw, false);
                document.getElementById('drawVal').innerText = currentDraw;
                document.getElementById('prizeLabel').innerText = `HADIAH: ${p.name}`;
                document.getElementById('prizeLabel').style.color = (currentDraw === 11) ? "var(--gold)" : "var(--cyber-green)";
            } else { document.getElementById('prizeLabel').innerText = "UNDIAN UTAMA SELESAI"; }
        }

        function updateHistory() {
            document.getElementById('historyBody').innerHTML = winnersLog.map(w => `<tr><td style="color:#555">#${w.no}</td><td style="color:var(--cyber-green); font-weight:bold;">${w.kupon}</td><td style="font-size: 0.9rem;">${w.prize}</td></tr>`).reverse().join('');
        }

        function downloadPDF() {
            document.getElementById('pdf-body').innerHTML = winnersLog.map(w => `<tr><td>${w.no}</td><td>${w.kupon}</td><td>${w.prize}</td></tr>`).join('');
            const element = document.getElementById('pdf-template');
            element.style.display = 'block';
            html2pdf().from(element).set({margin: 1, filename: `DigiPrize_Laporan_Batch_${currentBatch}.pdf`}).save().then(()=>element.style.display='none');
        }
    </script>
</body>
</html>
