<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiPrize Dashboard Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: 'Inter', sans-serif; }
        
        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .glass-card:hover { 
            transform: translateY(-5px); 
            border-color: rgba(255, 255, 255, 0.3); 
        }

        .font-basic { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        .font-exclusive { font-family: 'Playfair Display', serif; letter-spacing: 0.05em; }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background-color: #1f2937;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 50;
            border-radius: 12px;
            border: 1px solid #374151;
            overflow: hidden;
        }
        .dropdown-content a {
            color: #ffffff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
            transition: background 0.2s;
        }
        .dropdown-content a:hover { background-color: #374151; }
        .show { display: block; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-16">
            <h1 class="text-2xl font-black italic tracking-tighter">
                DIGIPRIZE <span class="text-blue-500">HUB</span>
            </h1>
            
            <div class="relative">
                <button onclick="toggleMenu()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition">
                    <i class="fas fa-ellipsis-v text-white"></i>
                </button>
                <div id="mainDropdown" class="dropdown-content">
                    <a href="https://digiflixxx.github.io/DigiPrize/Dashboard-Menu"><i class="fas fa-home mr-2 text-gray-400"></i> Menu Utama</a>
                    <a href="https://digiflixxx.github.io/DigiPrize/Dashboard-Basic"><i class="fas fa-certificate mr-2 text-blue-400"></i> DigiPrize Basic</a>
                    <a href="https://digiflixxx.github.io/DigiPrize/Dashboard-Eksklusif"><i class="fas fa-crown mr-2 text-yellow-500"></i> DigiPrize Eksklusif</a>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="glass-card rounded-3xl p-8 relative overflow-hidden font-basic">
                <div class="absolute -right-4 -top-4 opacity-5"><i class="fas fa-certificate text-9xl"></i></div>
                <h2 class="text-xl font-black mb-8 flex items-center gap-3">
                    <i class="fas fa-certificate text-blue-400"></i> PAKET BASIC
                </h2>
                
                <div class="space-y-5 mb-8">
                    <div class="flex justify-between items-end">
                        <span class="text-gray-400 text-[10px] uppercase font-bold tracking-widest">Terjual</span>
                        <span id="basicTerjual" class="text-3xl font-black">--</span>
                    </div>

                    <div class="w-full bg-gray-700/50 h-1.5 rounded-full overflow-hidden">
                        <div id="basicProgress" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>

                    <div class="flex justify-between items-end border-b border-white/5 pb-2">
                        <span class="text-gray-400 text-[10px] uppercase font-bold tracking-widest">Sisa Kuota</span>
                        <span id="basicSisa" class="text-3xl font-black text-blue-500">--</span>
                    </div>

                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                        <span class="text-gray-500 text-[9px] uppercase font-bold">Top Referral</span>
                        <span id="basicTopRef" class="text-xs font-black text-white">--</span>
                    </div>
                </div>

                <a href="https://digiflixxx.github.io/DigiPrize/Dashboard-Basic" class="block text-center py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-black text-xs transition-all uppercase tracking-widest">
                    Detail Basic
                </a>
            </div>

            <div class="glass-card rounded-3xl p-8 relative overflow-hidden font-exclusive">
                <div class="absolute -right-4 -top-4 opacity-10 text-yellow-500"><i class="fas fa-crown text-9xl"></i></div>
                <h2 class="text-xl font-bold italic mb-8 flex items-center gap-3 text-yellow-500 underline decoration-yellow-500/30 underline-offset-8">
                    <i class="fas fa-crown"></i> Paket Eksklusif
                </h2>
                
                <div class="space-y-5 mb-8">
                    <div class="flex justify-between items-end">
                        <span class="text-yellow-500/60 text-[9px] uppercase font-bold tracking-[0.2em]">Terjual</span>
                        <span id="eksTerjual" class="text-3xl font-bold italic">--</span>
                    </div>

                    <div class="w-full bg-gray-700/50 h-1.5 rounded-full overflow-hidden">
                        <div id="eksProgress" class="bg-yellow-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>

                    <div class="flex justify-between items-end border-b border-white/10 pb-2">
                        <span class="text-yellow-500/60 text-[9px] uppercase font-bold tracking-[0.2em]">Sisa Kuota</span>
                        <span id="eksSisa" class="text-3xl font-bold italic text-yellow-500">--</span>
                    </div>

                    <div class="flex justify-between items-center bg-yellow-500/10 p-3 rounded-xl border border-yellow-500/20">
                        <span class="text-yellow-500/60 text-[9px] uppercase font-bold tracking-[0.1em]">Top Referral</span>
                        <span id="eksTopRef" class="text-xs font-black text-yellow-500">--</span>
                    </div>
                </div>

                <a href="https://digiflixxx.github.io/DigiPrize/Dashboard-Eksklusif" class="block text-center py-4 bg-gradient-to-r from-yellow-700 to-yellow-500 hover:from-yellow-600 hover:to-yellow-400 text-black rounded-xl font-black text-xs transition-all uppercase tracking-[0.2em]">
                    Detail Eksklusif
                </a>
            </div>

        </div>

        <div class="mt-16 text-center">
            <div id="lastSync" class="text-[9px] text-gray-500 font-mono uppercase tracking-[0.3em] italic">Sinkronisasi Data Berjalan</div>
        </div>
    </div>

    <script>
        const URL_BASIC = "https://script.google.com/macros/s/AKfycbzLifWArKaHd_21XB8j71ysD_Q-D_0B8yrgEc6uJl2cTp1Ks2mve2Ovz-oC3aAXBekoqQ/exec";
        const URL_EKSKLUSIF = "https://script.google.com/macros/s/AKfycbyy8orAclAigoCOCksBQglDA6IvJqxPfCAsisdynBxwlHgdwccV2SBmZO920_LitXm0cg/exec";

        function toggleMenu() {
            document.getElementById("mainDropdown").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.relative')) {
                document.getElementById("mainDropdown").classList.remove('show');
            }
        }

        async function fetchData() {
            try {
                // Basic Sync
                const resBasic = await fetch(URL_BASIC);
                const dataBasic = await resBasic.json();
                document.getElementById('basicTerjual').innerText = dataBasic.terjual;
                document.getElementById('basicSisa').innerText = dataBasic.sisaBatch;
                document.getElementById('basicTopRef').innerText = dataBasic.topRef;
                let basicPercent = (dataBasic.terjual / 250) * 100;
                document.getElementById('basicProgress').style.width = basicPercent + "%";

                // Eksklusif Sync
                const resEks = await fetch(URL_EKSKLUSIF);
                const dataEks = await resEks.json();
                document.getElementById('eksTerjual').innerText = dataEks.terjual;
                document.getElementById('eksSisa').innerText = dataEks.sisaBatch;
                document.getElementById('eksTopRef').innerText = dataEks.topRef;
                let eksPercent = (dataEks.terjual / 500) * 100;
                document.getElementById('eksProgress').style.width = eksPercent + "%";

                const now = new Date();
                document.getElementById('lastSync').innerText = "Data Terkini: " + now.toLocaleTimeString();
            } catch (err) {
                document.getElementById('lastSync').innerText = "Koneksi Bermasalah";
            }
        }

        window.onload = fetchData;
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
