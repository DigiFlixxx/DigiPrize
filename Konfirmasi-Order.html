function updateProduk() {
    let kategori = document.getElementById("kategori").value;
    let produkDropdown = document.getElementById("produk");
    produkDropdown.innerHTML = "<option value=''>Pilih Produk</option>";
    if(produkList[kategori]) {
        produkList[kategori].forEach(function(item) {
            let option = document.createElement("option");
            option.value = item; option.text = item;
            produkDropdown.appendChild(option);
        });
    }
}

function formatWA(input) {
    let angka = input.value.replace(/[^0-9]/g, '');
    if (angka.startsWith("08")) { angka = "628" + angka.substring(2); }
    input.value = angka;
}

function prosesData() {

    const referral = document.getElementById("referral").value.trim();
    const kategori = document.getElementById("kategori").value;
    const produk = document.getElementById("produk").value;

    if (nama === "" || wa === "" || gmail === "" || produk === "") {
        alert("Mohon lengkapi semua data!"); return;
    }

    btn.disabled = true;
    btn.innerText = "Memproses...";

    let formData = new FormData();
    formData.append("nama", nama);
    formData.append("wa", wa);
    formData.append("gmail", gmail);
    formData.append("referral", referral);
    formData.append("kategori", kategori);
    formData.append("produk", produk);
    formData.append("link_produk", linkProdukList[produk]);

    fetch(scriptURL, { method: 'POST', body: formData })
    .then(response => {
        alert("Konfirmasi Berhasil! Silakan cek Gmail Anda untuk mendapatkan link akses.");
        btn.disabled = false;
        btn.innerText = "KONFIRMASI SEKARANG";
        document.querySelectorAll('input, select').forEach(el => el.value = '');
    })
    .catch(error => {
        alert("Terjadi gangguan koneksi.");
        btn.disabled = false;
        btn.innerText = "COBA LAGI";
    });
