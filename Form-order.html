function updateProduk(){

let kategori=document.getElementById("kategori").value;
let produk=document.getElementById("produk");

produk.innerHTML="<option value=''>Pilih Produk</option>";

if(produkList[kategori]){

produkList[kategori].forEach(function(item){

let option=document.createElement("option");
option.value=item;
option.text=item;

produk.appendChild(option);

});

}

}


function formatWA(input){

let angka=input.value.replace(/[^0-9]/g,'');

if(angka.startsWith("08")){
angka="628"+angka.substring(2);
}

input.value=angka;

}
